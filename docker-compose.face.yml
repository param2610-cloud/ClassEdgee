version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: classedgee
      RABBITMQ_DEFAULT_PASS: classedgee

  ml-worker:
    build:
      context: ./ml-worker
    environment:
      RABBITMQ_URL: amqp://classedgee:classedgee@rabbitmq:5672
      FACE_REGISTER_QUEUE: face.register
      FACE_RECOGNIZE_QUEUE: face.recognize
      FACE_RESULTS_QUEUE: face.results
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      - rabbitmq
